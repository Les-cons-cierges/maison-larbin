framework:
    asset_mapper:
        # The paths to make available to the asset mapper.
        paths:
            - assets/
        excluded_patterns:
            # Front CSS is handled by Vite/Tailwind, not Symfony AssetMapper.
            - '*/styles/app.css'
        missing_import_mode: strict

when@prod:
    framework:
        asset_mapper:
            missing_import_mode: warn
